<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Vero o Falso — Host</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F3FF;min-height:100vh;padding-bottom:2rem;}
.screen{display:none;}
.screen.active{display:block;}

/* LOBBY */
#lobby-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;background:#F4F3FF;}
.setup-card{background:#fff;border-radius:16px;border:0.5px solid #EEEDFE;padding:1.25rem;width:100%;max-width:340px;}
.field-lbl{font-size:11px;font-weight:700;letter-spacing:0.06em;color:#534AB7;text-transform:uppercase;margin-bottom:6px;}
.code-block{background:#EEEDFE;border-radius:14px;padding:1.25rem;text-align:center;margin-bottom:14px;}
.code-lbl{font-size:11px;font-weight:700;letter-spacing:0.06em;color:#534AB7;text-transform:uppercase;margin-bottom:4px;}
.code-big{font-size:36px;font-weight:900;color:#26215C;letter-spacing:0.14em;}
.code-url{font-size:12px;color:#AFA9EC;margin-top:4px;}
.sec{font-size:11px;font-weight:700;letter-spacing:0.06em;color:#534AB7;text-transform:uppercase;margin-bottom:8px;margin-top:1.25rem;}
.sec:first-child{margin-top:0;}
.players-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.p-chip{display:flex;align-items:center;gap:5px;background:#fff;border:0.5px solid #EEEDFE;border-radius:99px;padding:4px 10px 4px 7px;font-size:13px;color:#26215C;}
.p-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
.btn-green{width:100%;padding:14px;font-size:15px;font-weight:700;background:#1D9E75;color:#fff;border:none;border-radius:10px;cursor:pointer;}

/* GAME */
.top-teal{background:#1D9E75;padding:1rem 1.25rem;}
.bar-row{display:flex;justify-content:space-between;align-items:flex-start;}
.bar-title{font-size:17px;font-weight:700;color:#fff;}
.bar-sub{font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;}
.bar-right-lbl{font-size:11px;color:rgba(255,255,255,0.7);text-align:right;}
.bar-right-val{font-size:16px;font-weight:800;color:#fff;text-align:right;}
.body{padding:1rem;}
.resp-row{display:flex;justify-content:space-between;align-items:center;background:#fff;border:0.5px solid #EEEDFE;border-radius:10px;padding:9px 13px;margin-bottom:14px;}
.resp-lbl{font-size:13px;color:#888780;}
.resp-val{font-size:14px;font-weight:700;color:#26215C;}
.big-btns{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px;}
.big-vero{padding:1.5rem 0.5rem;font-size:22px;font-weight:800;background:#1D9E75;color:#fff;border:none;border-radius:14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:opacity 0.15s,transform 0.1s;}
.big-vero:active{transform:scale(0.97);}
.big-falso{padding:1.5rem 0.5rem;font-size:22px;font-weight:800;background:#E24B4A;color:#fff;border:none;border-radius:14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:opacity 0.15s,transform 0.1s;}
.big-falso:active{transform:scale(0.97);}
.big-vero svg,.big-falso svg{width:30px;height:30px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.sec-game{font-size:11px;font-weight:700;letter-spacing:0.06em;color:#534AB7;text-transform:uppercase;margin-bottom:8px;}
.score-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.sc-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid #F1EFE8;}
.sc-row:last-child{border-bottom:none;}
.sc-pos{font-size:13px;font-weight:700;color:#7F77DD;width:18px;}
.sc-name{flex:1;font-size:13px;color:#26215C;}
.sc-pts{font-size:13px;color:#888780;}
.btn-ghost{width:100%;padding:12px;font-size:14px;font-weight:600;background:#F1EFE8;color:#26215C;border:none;border-radius:10px;margin-bottom:8px;cursor:pointer;}
.btn-red{width:100%;padding:12px;font-size:14px;font-weight:600;background:#FCEBEB;color:#791F1F;border:none;border-radius:10px;cursor:pointer;}

/* WINNER */
#winner-screen{background:#F4F3FF;}
.winner-top{background:#7F77DD;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.25rem;text-align:center;position:relative;overflow:hidden;}
.confetti-wrap{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.confetto{position:absolute;border-radius:2px;animation:fall linear infinite;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}
.trophy{font-size:64px;animation:trophyPulse 1.2s ease-in-out infinite;position:relative;z-index:1;margin-bottom:10px;}
@keyframes trophyPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.winner-name{font-size:24px;font-weight:800;color:#fff;position:relative;z-index:1;}
.winner-sub{font-size:13px;color:#CECBF6;margin-top:6px;position:relative;z-index:1;}
.podium{padding:1rem;}
.pod-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #EEEDFE;}
.pod-row:last-child{border-bottom:none;}
.pod-medal{font-size:18px;width:26px;text-align:center;}
.pod-name{flex:1;font-size:14px;font-weight:500;color:#26215C;}
.pod-pts{font-size:13px;color:#888780;}
.btn-back{display:block;text-align:center;margin:1rem;padding:13px;background:#7F77DD;color:#fff;font-size:15px;font-weight:700;border:none;border-radius:12px;text-decoration:none;cursor:pointer;}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby-screen" class="active">
  <div class="code-block" style="margin:0 0 1.5rem;width:100%;max-width:340px;background:#EEEDFE;border-radius:14px;padding:1.25rem;text-align:center;">
    <div class="code-lbl">Codice stanza</div>
    <div class="code-big" id="lobby-code">—</div>
    <div class="code-url">sjd-c.github.io/game</div>
  </div>
  <div style="width:100%;max-width:340px;padding:0 1rem;">
    <div class="sec">Giocatori connessi</div>
    <div class="players-row" id="lobby-players"><span style="font-size:13px;color:#888780;">Nessuno ancora…</span></div>
    <button class="btn-green" onclick="startGame()">Inizia il gioco</button>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="top-teal">
    <div class="bar-row">
      <div><div class="bar-title">Vero o falso</div><div class="bar-sub">Rivela la risposta corretta</div></div>
      <div><div class="bar-right-lbl">Manche</div><div class="bar-right-val" id="round-display">1</div></div>
    </div>
  </div>
  <div class="body">
    <div class="resp-row">
      <span class="resp-lbl">Risposte ricevute</span>
      <span class="resp-val" id="resp-count">0 / 0</span>
    </div>
    <div class="big-btns">
      <button class="big-vero" id="btn-vero" onclick="reveal('vero')">
        <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
        Vero
      </button>
      <button class="big-falso" id="btn-falso" onclick="reveal('falso')">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        Falso
      </button>
    </div>
    <div class="sec-game">Punteggio</div>
    <div class="score-list" id="score-list"></div>
    <button class="btn-ghost" id="btn-next" onclick="nextRound()" style="display:none;">Prossima domanda</button>
    <button class="btn-red" onclick="endGame()">Fine gioco</button>
  </div>
</div>

<!-- WINNER -->
<div id="winner-screen" class="screen">
  <div class="winner-top">
    <div class="confetti-wrap" id="confetti"></div>
    <div class="trophy">🏆</div>
    <div class="winner-name" id="w-name">—</div>
    <div class="winner-sub" id="w-sub"></div>
  </div>
  <div class="podium" id="podium"></div>
  <button class="btn-back" onclick="window.location.href='index.html'">Torna alla sala giochi</button>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,onValue,update}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={databaseURL:"https://vero-falso-default-rtdb.europe-west1.firebasedatabase.app"};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const params=new URLSearchParams(location.search);
const roomCode=params.get('room')||'';
let roundNum=1,players={},revealed=false;

document.getElementById('lobby-code').textContent=roomCode;

function show(id){['lobby-screen','game-screen','winner-screen'].forEach(s=>{const el=document.getElementById(s);el.classList.remove('active');el.style.display='none';});const el=document.getElementById(id);el.classList.add('active');el.style.display='';}

onValue(ref(db,`rooms/${roomCode}/players`),snap=>{
  players=snap.val()||{};
  const total=Object.keys(players).length;
  const row=document.getElementById('lobby-players');
  row.innerHTML=total===0?'<span style="font-size:13px;color:#888780;">Nessuno ancora…</span>':Object.keys(players).map(n=>`<div class="p-chip"><div class="p-dot"></div>${n}</div>`).join('');
  document.getElementById('resp-count').textContent=(Object.values(players).filter(p=>p.answer).length)+' / '+total;
  renderScores();
  onValue(ref(db,`rooms/${roomCode}/players`),snap2=>{
    players=snap2.val()||{};
    const answered=Object.values(players).filter(p=>p.answer).length;
    const tot=Object.keys(players).length;
    document.getElementById('resp-count').textContent=answered+' / '+tot;
    renderScores();
  });
});

function renderScores(){
  const sorted=Object.entries(players).sort((a,b)=>(b[1].pts||0)-(a[1].pts||0));
  document.getElementById('score-list').innerHTML=sorted.map(([name,data],i)=>
    `<div class="sc-row"><span class="sc-pos">${i+1}</span><span class="sc-name">${name}</span><span class="sc-pts">${Math.round(data.pts||0)} pt</span></div>`
  ).join('');
}

window.startGame=function(){
  update(ref(db,`rooms/${roomCode}/game`),{type:'vero-falso',status:'playing',correct:null,round:1});
  roundNum=1;revealed=false;
  document.getElementById('round-display').textContent=roundNum;
  document.getElementById('btn-next').style.display='none';
  show('game-screen');
};

window.reveal=function(answer){
  if(revealed)return;
  revealed=true;
  document.getElementById('btn-vero').style.opacity=answer==='vero'?'1':'0.35';
  document.getElementById('btn-falso').style.opacity=answer==='falso'?'1':'0.35';
  update(ref(db,`rooms/${roomCode}/game`),{correct:answer});
  setTimeout(()=>{document.getElementById('btn-next').style.display='block';},400);
};

window.nextRound=function(){
  revealed=false;roundNum++;
  document.getElementById('round-display').textContent=roundNum;
  document.getElementById('btn-vero').style.opacity='1';
  document.getElementById('btn-falso').style.opacity='1';
  document.getElementById('btn-next').style.display='none';
  Object.keys(players).forEach(name=>{update(ref(db,`rooms/${roomCode}/players/${name}`),{answer:null});});
  update(ref(db,`rooms/${roomCode}/game`),{correct:null,round:roundNum});
};

window.endGame=function(){
  const scores={};
  Object.entries(players).forEach(([name,data])=>{scores[name]=data.pts||0;});
  update(ref(db,`rooms/${roomCode}/game`),{status:'finished',scores});
  showWinner(scores);
};

function showWinner(scores){
  show('winner-screen');
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  document.getElementById('w-name').textContent=(sorted[0]?.[0]||'—')+' vince!';
  document.getElementById('w-sub').textContent='Con '+Math.round(sorted[0]?.[1]||0)+' punti totali';
  const medals=['🥇','🥈','🥉'];
  document.getElementById('podium').innerHTML=sorted.slice(0,4).map(([name,pts],i)=>
    `<div class="pod-row"><span class="pod-medal">${medals[i]||i+1}</span><span class="pod-name">${name}</span><span class="pod-pts">${Math.round(pts)} pt</span></div>`
  ).join('');
  spawnConfetti();
}

function spawnConfetti(){
  const wrap=document.getElementById('confetti');wrap.innerHTML='';
  const colors=['#CECBF6','#9FE1CB','#FAC775','#F4C0D1','#fff','#EF9F27'];
  for(let i=0;i<32;i++){
    const c=document.createElement('div');c.className='confetto';
    c.style.cssText=`left:${Math.random()*100}%;background:${colors[i%colors.length]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*1.5}s;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;`;
    wrap.appendChild(c);
  }
}
</script>
</body>
</html>
